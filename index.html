<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dua-dua | Split-Toe Movement</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .letter-spacing-custom { letter-spacing: 0.3em; }
    </style>
</head>
<body class="bg-[#F9F8F3] text-[#2D2D2D] selection:bg-black selection:text-white">

    <nav class="p-8 flex justify-between items-center max-w-6xl mx-auto">
        <div class="font-bold text-xl letter-spacing-custom">DUA-DUA</div>
        <div class="text-xs uppercase tracking-widest text-gray-400">Kuala Lumpur • 2026</div>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-20 lg:py-32 flex flex-col items-center text-center">
        
        <span class="inline-block px-3 py-1 border border-black text-[10px] uppercase tracking-widest mb-8">
            The Split-Toe Movement
        </span>

        <h1 class="text-5xl lg:text-7xl font-light leading-tight mb-8">
            Every pair has a story. <br>
            <span class="font-bold italic">Two for you.</span>
        </h1>

        <p class="text-gray-500 max-w-md mx-auto mb-12 leading-relaxed">
            重新定义大马人的脚步。Dua-dua 专为极简主义者设计，让你的脚趾在每一双 Tabi 或球鞋里都能自由呼吸。
        </p>

        <div class="w-full max-w-sm">
            <form class="flex flex-col space-y-4">
                <input type="email" placeholder="Email Address" 
                    class="bg-transparent border-b border-black py-3 px-1 focus:outline-none focus:border-gray-400 transition placeholder:text-gray-300 text-lg">
                <button class="bg-black text-white py-4 px-8 uppercase tracking-[0.2em] text-xs hover:bg-zinc-800 transition duration-300">
                    Get Early Access
                </button>
            </form>
            <p class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest">
                Be the first to know the drop.
            </p>
        </div>
    </main>

    <footer class="fixed bottom-8 w-full text-center text-[10px] text-gray-300 tracking-[0.5em] uppercase pointer-events-none">
        Coming Soon • April 2026
    </footer>

</body>
</html>
