<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dua-dua | Split-Toe Movement</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 1.2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .blue-gradient { background: linear-gradient(135deg, #0055FF 0%, #00AAFF 100%); }
    </style>
</head>
<body class="bg-white text-black overflow-x-hidden">

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto fade-in" style="animation-delay: 0.2s;">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black text-white flex items-center justify-center font-bold italic text-sm rounded-full">22</div>
            <span class="font-extrabold tracking-tighter text-xl uppercase">Dua-dua</span>
        </div>
        <div class="text-[10px] tracking-[0.4em] uppercase font-semibold text-blue-600">Drop 01 / April 2026</div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12 grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
        
        <div class="fade-in" style="animation-delay: 0.4s;">
            <h1 class="text-7xl lg:text-9xl font-extrabold leading-[0.85] tracking-tighter mb-10">
                TWO.<br>
                <span class="text-blue-600">FREE.</span><br>
                FLOW.
            </h1>
            <p class="text-xl text-gray-400 max-w-sm mb-12 leading-tight">
                Not just a sock. A new way to stand. <br>Designed in KL, for the bold.
            </p>

            <div class="relative max-w-md group">
                <input type="email" placeholder="Drop your email" 
                    class="w-full bg-gray-50 border-0 border-b-2 border-gray-200 py-5 px-4 focus:outline-none focus:border-blue-600 transition-all text-lg font-medium">
                <button class="mt-6 w-full lg:w-auto bg-blue-600 text-white px-12 py-5 font-bold uppercase tracking-widest hover:bg-black transition-all duration-500 transform hover:-translate-y-1 shadow-xl shadow-blue-200">
                    Get Early Access
                </button>
            </div>
        </div>

        <div class="grid grid-cols-12 grid-rows-12 gap-4 aspect-square fade-in" style="animation-delay: 0.6s;">
            <div class="col-span-8 row-span-8 bg-gray-100 rounded-2xl overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1590673880361-91418e6629ec?q=80&w=800" class="w-full h-full object-cover transition duration-700 group-hover:scale-110 grayscale group-hover:grayscale-0">
            </div>
            <div class="col-span-4 row-span-5 col-start-9 bg-blue-600 rounded-2xl flex items-end p-4">
                <span class="text-white font-bold text-4xl leading-none">22</span>
            </div>
            <div class="col-span-5 row-span-4 col-start-8 row-start-6 bg-gray-200 rounded-2xl overflow-hidden group">
                 <img src="https://images.unsplash.com/photo-1584033660098-f58694077884?q=80&w=800" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700">
            </div>
        </div>
    </main>

    <div class="p-12 text-center fade-in" style="animation-delay: 0.8s;">
        <p class="text-[10px] tracking-[0.5em] text-gray-300 uppercase">Malaysia's First Dedicated Split-Toe Label</p>
    </div>

</body>
</html>
